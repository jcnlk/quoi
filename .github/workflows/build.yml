name: Build

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check Out Repository
        uses: actions/checkout@v4

      - name: Set Up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Mod
        run: ./gradlew build validateAccessWidener remapJar --stacktrace

      - name: Stage Build Artifacts
        if: always()
        run: |
          rm -rf ci-artifacts
          mkdir -p ci-artifacts/reports
          cp build/libs/*.jar ci-artifacts/
          if [ -d build/reports ]; then
            cp -R build/reports/. ci-artifacts/reports/
          fi

      - name: Upload Build Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quoi-build-artifacts
          path: |
            ci-artifacts/*
            ci-artifacts/reports/**
          if-no-files-found: warn
